services:
  geoip:
    image: stefansundin/maxmind-geoip-api
    ports:
      - 3000:80
    volumes:
      # Mount the whole data directory (allows for replacing the database file, don't forget to send SIGHUP after replacing it):
      - ../../data:/data:ro
      # Or mount just the database file:
      # - ../../data/database.mmdb:/data/database.mmdb:ro
